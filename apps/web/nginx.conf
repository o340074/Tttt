# AdVault web — production Nginx (serves the built SPA + reverse-proxies the API).
# The SPA calls the API same-origin at /api/v1/* (apps/web/src/lib/api.ts), so
# Nginx both serves static assets and forwards /api to the API service. Because
# the API is same-origin here, the document CSP can keep connect-src 'self'.

# WebSocket upgrade plumbing: reflect the client's Upgrade intent to the API.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream advault_api {
    # Service name on the prod compose network; override for other topologies.
    server api:3000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- API reverse proxy: keep the /api/v1 prefix intact for the API's global
    # prefix. No security headers added here — the API sets its own (helmet). ---
    location /api/ {
        proxy_pass http://advault_api;
        proxy_http_version 1.1;
        # Upgrade headers let the notifications WebSocket (/api/ws/notifications,
        # E9) pass through; harmless for plain HTTP requests.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A live socket must not be culled by the default read timeout.
        proxy_read_timeout 3600s;
    }

    # --- Fingerprinted static assets: long-lived immutable cache + security. ---
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|gif|ico|webp)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # --- SPA entrypoint: never cached, carries the strict document CSP. ---
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
