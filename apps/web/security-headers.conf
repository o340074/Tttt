# Security headers for the SPA document + static assets (docs/17 §2, docs/09).
# Kept in a snippet and `include`d per-location because an nginx `location` with
# its own add_header stops inheriting server-level ones. Deliberately NOT applied
# to /api/ — those responses already carry the API's own helmet headers, and a
# second Content-Security-Policy would be intersected by the browser.
#
# Strict document CSP: scripts self-only; Tailwind inlines critical styles so
# style-src allows 'unsafe-inline'; the API is same-origin (reverse-proxied) so
# connect-src stays 'self'.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
# HSTS — only meaningful over TLS; harmless behind a plain-HTTP TLS terminator.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
