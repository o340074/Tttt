# AdVault — production stack WITH automatic HTTPS (Caddy + Let's Encrypt).
# Same services as docker-compose.prod.yml, but the web container is not
# published directly; Caddy owns :80/:443, terminates TLS for a sslip.io host,
# and reverse-proxies to it. Real HTTPS makes the `secure` refresh cookie work,
# so login persists (unlike plain HTTP on a bare IP).
#
# Usage (from the repo root):
#   cp .env.example .env                      # fill secrets; set WEB_URL/CORS_ORIGIN to the https host
#   # edit deploy/Caddyfile: put your server IP (dots→dashes) in the hostname
#   docker compose -f deploy/docker-compose.tls.yml up -d --build
#   docker compose -f deploy/docker-compose.tls.yml run --rm api pnpm --filter @advault/api db:seed

name: advault-prod

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
